<body class="bg-background text-on-surface min-h-screen pb-24 overflow-x-hidden">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 bg-[#F7F9FC]/90 backdrop-blur-md dark:bg-slate-900/90 flex justify-between items-center w-full px-4 py-3 border-b border-outline-variant/10">

</div>
<div class="flex items-center gap-1">
<button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#F2F4F7] dark:hover:bg-slate-800 transition-colors active:opacity-80">
<span class="material-symbols-outlined text-[#404753] dark:text-slate-400">search</span>
</button>
<button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#F2F4F7] dark:hover:bg-slate-800 transition-colors active:opacity-80">
<span class="material-symbols-outlined text-[#404753] dark:text-slate-400">notifications</span>
</button>
</div>
</header>
<main class="px-4 py-4 space-y-6 max-w-md mx-auto w-full box-border">

<section class="bg-surface-container-lowest p-5 rounded-2xl shadow-sm border border-outline-variant/10">
<div class="flex items-center justify-between mb-5">
<h3 class="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest">盘点统计</h3>
<span class="text-[10px] px-2 py-0.5 bg-primary-container/20 text-primary rounded-full font-medium">实时更新</span>
</div>
<div class="flex flex-row items-center justify-center gap-4 sm:gap-8">

<div class="relative flex-shrink-0 w-24 h-24">
<svg class="w-full h-full -rotate-90" viewbox="0 0 100 100">
<circle class="text-surface-container-high" cx="50" cy="50" fill="transparent" r="40" stroke="currentColor" stroke-width="12"></circle>
<circle class="text-primary chart-ring" cx="50" cy="50" fill="transparent" r="40" stroke="currentColor" stroke-dasharray="251.2" stroke-dashoffset="45.2" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">

</div>
<span class="text-xs font-bold text-on-surface tabular-nums">2,312</span>
</div>
</div>
</div>
</section>

<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">app_registration</span>
</div>
<span class="text-[10px] font-bold text-on-surface text-center leading-tight">快速登记</span>

</div>
</section>

<button class="flex flex-col items-center justify-center text-[#005DAA] dark:text-blue-400 flex-1">

<button class="fixed right-6 bottom-24 w-14 h-14 tech-gradient rounded-full shadow-lg shadow-primary/20 flex items-center justify-center text-on-primary active:scale-90 transition-transform z-40">
