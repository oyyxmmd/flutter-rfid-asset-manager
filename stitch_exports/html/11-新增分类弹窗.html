<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sino-Asset Pro - 新增分类</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed-dim": "#ffb688",
              "secondary-fixed-dim": "#aec8f2",
              "surface-container-high": "#e6e8f0",
              "surface-dim": "#d8dae2",
              "secondary-container": "#b9d3fe",
              "inverse-primary": "#a5c8ff",
              "error-container": "#ffdad6",
              "on-primary-fixed": "#001c3a",
              "on-secondary-fixed-variant": "#2d486b",
              "on-primary-fixed-variant": "#004784",
              "on-tertiary-fixed-variant": "#733500",
              "inverse-on-surface": "#eef0f9",
              "on-error": "#ffffff",
              "error": "#ba1a1a",
              "outline-variant": "#c0c7d4",
              "on-surface": "#181c22",
              "surface-variant": "#e0e2ea",
              "background": "#f9f9ff",
              "on-surface-variant": "#414752",
              "surface-tint": "#005fad",
              "primary-fixed-dim": "#a5c8ff",
              "on-tertiary-container": "#fffbff",
              "secondary": "#466084",
              "on-tertiary-fixed": "#311300",
              "on-secondary": "#ffffff",
              "outline": "#717784",
              "on-error-container": "#93000a",
              "surface-container-low": "#f1f3fc",
              "surface-container-highest": "#e0e2ea",
              "surface-container": "#eceef6",
              "tertiary-fixed": "#ffdbc7",
              "secondary-fixed": "#d4e3ff",
              "inverse-surface": "#2d3037",
              "tertiary": "#934600",
              "primary": "#005da9",
              "on-secondary-container": "#415b7f",
              "primary-fixed": "#d4e3ff",
              "on-tertiary": "#ffffff",
              "on-background": "#181c22",
              "tertiary-container": "#b95a00",
              "on-primary-container": "#fefcff",
              "surface-bright": "#f9f9ff",
              "on-primary": "#ffffff",
              "surface": "#f9f9ff",
              "on-secondary-fixed": "#001c3a",
              "primary-container": "#0376d3"
            },
            fontFamily: {
              "headline": ["Inter", "Noto Sans SC"],
              "body": ["Inter", "Noto Sans SC"],
              "label": ["Inter", "Noto Sans SC"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .glass-overlay {
            backdrop-filter: blur(8px);
            background-color: rgba(24, 28, 34, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-0 m-0">
<!-- Background Context (Category Maintenance Screen) -->
<div class="w-full max-w-md h-[812px] bg-surface relative overflow-hidden shadow-2xl">
<!-- Top App Bar Mockup -->
<header class="bg-[#F7F9FC] text-[#005DAA] font-semibold text-lg tracking-tight shadow-sm w-full top-0 sticky flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined">menu</span>
<span class="text-xl font-bold bg-gradient-to-r from-[#005DAA] to-[#0075D5] bg-clip-text text-transparent">Sino-Asset Pro</span>
</div>
<span class="material-symbols-outlined">account_circle</span>
</header>
<!-- Content Area Mockup (Category List) -->
<main class="p-4 space-y-3">
<div class="flex justify-between items-center mb-4">
<h1 class="text-on-surface font-bold text-xl">Category Maintenance</h1>
<button class="bg-primary text-white p-2 rounded-lg flex items-center gap-1 text-sm font-medium">
<span class="material-symbols-outlined text-sm">add</span>
                    新增分类
                </button>
</div>
<!-- Category Cards -->
<div class="space-y-2">
<div class="bg-surface-container-lowest p-4 rounded-xl flex items-center justify-between border-l-4 border-primary shadow-sm">
<div>
<p class="text-xs text-on-surface-variant font-bold uppercase tracking-wider">CAT-001</p>
<p class="font-medium text-on-surface">IT Hardware</p>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
<div class="bg-surface-container-lowest p-4 rounded-xl flex items-center justify-between border-l-4 border-primary shadow-sm">
<div>
<p class="text-xs text-on-surface-variant font-bold uppercase tracking-wider">CAT-002</p>
<p class="font-medium text-on-surface">Office Furniture</p>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
<div class="bg-surface-container-lowest p-4 rounded-xl flex items-center justify-between border-l-4 border-primary shadow-sm">
<div>
<p class="text-xs text-on-surface-variant font-bold uppercase tracking-wider">CAT-003</p>
<p class="font-medium text-on-surface">Precision Lab Tools</p>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
</div>
</main>
<!-- THE BOTTOM SHEET MODAL OVERLAY -->
<div class="absolute inset-0 glass-overlay z-50 flex flex-col justify-end">
<!-- Modal Container -->
<div class="bg-surface-container-lowest rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.12)] animate-slide-up">
<!-- Handle Bar -->
<div class="w-full flex justify-center pt-3 pb-1">
<div class="w-12 h-1.5 bg-surface-variant rounded-full"></div>
</div>
<!-- Header -->
<div class="px-6 py-4 flex items-center justify-between">
<h2 class="text-on-surface font-bold text-lg">新增分类</h2>
<button class="text-on-surface-variant hover:bg-surface-container-high p-1 rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Form Content -->
<div class="px-6 pb-2 space-y-4">
<!-- Parent Category Field -->
<div class="space-y-1.5">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-tight flex items-center gap-1">
<span class="material-symbols-outlined text-sm">account_tree</span>
                            上级分类
                        </label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-on-surface appearance-none focus:ring-2 focus:ring-primary transition-all text-sm pr-10">
<option disabled="" selected="" value="">请选择上级分类 (可选)</option>
<option value="1">IT Hardware</option>
<option value="2">Office Furniture</option>
<option value="3">Precision Lab Tools</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Category Name Field -->
<div class="space-y-1.5">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-tight flex items-center gap-1">
<span class="material-symbols-outlined text-sm">label</span>
                            分类名称
                        </label>
<input class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary transition-all text-sm" placeholder="请输入分类名称" type="text"/>
</div>
</div>
<!-- Metadata/Info (High Density Detail) -->
<div class="px-6 py-3 flex items-center gap-3">
<div class="flex-1 bg-surface-container-low rounded-lg p-2 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">info</span>
<p class="text-[11px] text-on-surface-variant leading-tight">
                            系统将自动生成唯一的分类编码。新增后可在列表中进行RFID标签绑定操作。
                        </p>
</div>
</div>
<!-- Actions -->
<div class="px-6 pt-2 pb-8 grid grid-cols-2 gap-3">
<button class="w-full py-3 px-4 border border-outline-variant/30 text-on-surface font-medium rounded-xl hover:bg-surface-container-low active:scale-95 transition-all text-sm">
                        取消
                    </button>
<button class="w-full py-3 px-4 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-xl shadow-md hover:opacity-90 active:scale-95 transition-all text-sm border-t border-white/10">
                        确定新增
                    </button>
</div>
</div>
</div>
<!-- Decorative Asset Graphic for the Modal background context -->
<div class="absolute bottom-4 right-4 opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-[120px]" style="font-variation-settings: 'FILL' 1;">category</span>
</div>
</div>
</body></html>
