<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#ffdbc7",
              "outline-variant": "#c0c7d4",
              "outline": "#717784",
              "secondary": "#466084",
              "on-tertiary-fixed-variant": "#733500",
              "surface-tint": "#005fad",
              "tertiary-fixed-dim": "#ffb688",
              "on-secondary-container": "#415b7f",
              "inverse-surface": "#2d3037",
              "on-error-container": "#93000a",
              "on-primary-fixed": "#001c3a",
              "secondary-fixed-dim": "#aec8f2",
              "tertiary-container": "#b95a00",
              "on-primary": "#ffffff",
              "surface-variant": "#e0e2ea",
              "primary": "#005da9",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#eceef6",
              "on-background": "#181c22",
              "inverse-primary": "#a5c8ff",
              "on-secondary-fixed": "#001c3a",
              "on-primary-fixed-variant": "#004784",
              "error": "#ba1a1a",
              "surface": "#f9f9ff",
              "secondary-container": "#b9d3fe",
              "primary-container": "#0376d3",
              "surface-container-highest": "#e0e2ea",
              "inverse-on-surface": "#eef0f9",
              "surface-bright": "#f9f9ff",
              "on-surface": "#181c22",
              "error-container": "#ffdad6",
              "on-primary-container": "#fefcff",
              "secondary-fixed": "#d4e3ff",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed-variant": "#2d486b",
              "primary-fixed": "#d4e3ff",
              "on-error": "#ffffff",
              "background": "#f9f9ff",
              "tertiary": "#934600",
              "on-secondary": "#ffffff",
              "surface-container-low": "#f1f3fc",
              "on-surface-variant": "#414752",
              "surface-dim": "#d8dae2",
              "surface-container-high": "#e6e8f0",
              "primary-fixed-dim": "#a5c8ff",
              "on-tertiary-fixed": "#311300",
              "on-tertiary-container": "#fffbff"
            },
            fontFamily: {
              "headline": ["Inter", "PingFang SC"],
              "body": ["Inter", "PingFang SC"],
              "label": ["Inter", "PingFang SC"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', 'PingFang SC', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#F7F9FC] dark:bg-slate-900 sticky top-0 z-50">
<div class="flex justify-between items-center w-full px-6 py-3">
<div class="flex items-center gap-4">
<button class="text-[#005DAA] dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-slate-800 transition-colors p-1 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-semibold text-xl tracking-tight text-[#005DAA] dark:text-blue-400">部门管理</h1>
</div>
<div class="flex items-center gap-2">
<button class="text-[#005DAA] dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-slate-800 transition-colors p-2 rounded-lg active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
</header>
<main class="flex-1 pb-32">
<!-- Search Section -->
<div class="px-6 py-4 bg-surface-container-low">
<div class="relative group">
<div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-lg" data-icon="search">search</span>
</div>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/15 focus:ring-2 focus:ring-primary rounded-lg py-2.5 pl-10 pr-4 text-sm placeholder:text-outline" placeholder="搜索部门名称..." type="text"/>
</div>
</div>
<!-- Department List -->
<div class="bg-surface-container-low px-4">
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0px_4px_20px_0px_rgba(0,93,170,0.06)]">
<!-- Select All Header -->
<div class="flex items-center px-4 py-3 bg-surface-container border-b border-outline-variant/10">
<input class="rounded border-outline-variant text-primary focus:ring-primary h-5 w-5 mr-4" type="checkbox"/>
<span class="text-label-sm font-bold text-on-surface-variant uppercase tracking-wider">全部部门 (12)</span>
</div>
<!-- List Items -->
<div class="divide-y divide-outline-variant/10">
<!-- Item 1 -->
<div class="flex items-center px-4 py-3.5 hover:bg-surface-bright transition-colors group">
<input class="rounded border-outline-variant text-primary focus:ring-primary h-5 w-5 mr-4" type="checkbox"/>
<div class="flex-1">
<h3 class="text-body-md font-medium text-on-surface">技术研发部</h3>
</div>
<button class="text-outline hover:text-primary transition-colors p-2">
<span class="material-symbols-outlined text-xl" data-icon="edit">edit</span>
</button>
</div>
<!-- Item 2 -->
<div class="flex items-center px-4 py-3.5 hover:bg-surface-bright transition-colors group">
<input checked="" class="rounded border-outline-variant text-primary focus:ring-primary h-5 w-5 mr-4" type="checkbox"/>
<div class="flex-1">
<h3 class="text-body-md font-medium text-on-surface">行政部</h3>
</div>
<button class="text-outline hover:text-primary transition-colors p-2">
<span class="material-symbols-outlined text-xl" data-icon="edit">edit</span>
</button>
</div>
<!-- Item 3 -->
<div class="flex items-center px-4 py-3.5 hover:bg-surface-bright transition-colors group">
<input class="rounded border-outline-variant text-primary focus:ring-primary h-5 w-5 mr-4" type="checkbox"/>
<div class="flex-1">
<h3 class="text-body-md font-medium text-on-surface">生产制造部</h3>
</div>
<button class="text-outline hover:text-primary transition-colors p-2">
<span class="material-symbols-outlined text-xl" data-icon="edit">edit</span>
</button>
</div>
<!-- Item 4 -->
<div class="flex items-center px-4 py-3.5 hover:bg-surface-bright transition-colors group">
<input class="rounded border-outline-variant text-primary focus:ring-primary h-5 w-5 mr-4" type="checkbox"/>
<div class="flex-1">
<h3 class="text-body-md font-medium text-on-surface">品质检测中心</h3>
</div>
<button class="text-outline hover:text-primary transition-colors p-2">
<span class="material-symbols-outlined text-xl" data-icon="edit">edit</span>
</button>
</div>
<!-- Item 5 -->
<div class="flex items-center px-4 py-3.5 hover:bg-surface-bright transition-colors group">
<input checked="" class="rounded border-outline-variant text-primary focus:ring-primary h-5 w-5 mr-4" type="checkbox"/>
<div class="flex-1">
<h3 class="text-body-md font-medium text-on-surface">供应链管理部</h3>
</div>
<button class="text-outline hover:text-primary transition-colors p-2">
<span class="material-symbols-outlined text-xl" data-icon="edit">edit</span>
</button>
</div>
<!-- Item 6 -->
<div class="flex items-center px-4 py-3.5 hover:bg-surface-bright transition-colors group">
<input class="rounded border-outline-variant text-primary focus:ring-primary h-5 w-5 mr-4" type="checkbox"/>
<div class="flex-1">
<h3 class="text-body-md font-medium text-on-surface">市场营销中心</h3>
</div>
<button class="text-outline hover:text-primary transition-colors p-2">
<span class="material-symbols-outlined text-xl" data-icon="edit">edit</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- Batch Action Bar -->
<div class="fixed bottom-6 left-4 right-4 z-40">
<div class="bg-surface-container-lowest/80 backdrop-blur-xl shadow-[0px_4px_20px_0px_rgba(0,93,170,0.1)] rounded-2xl p-4 flex items-center justify-between ring-1 ring-outline-variant/20">
<div class="flex flex-col">
<span class="text-[11px] font-bold text-outline uppercase tracking-widest">已选择</span>
<span class="text-primary font-bold">2 个部门</span>
</div>
<button class="flex items-center gap-2 bg-error text-on-error px-6 py-2.5 rounded-xl font-medium text-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-lg" data-icon="delete">delete</span>
                批量删除
            </button>
</div>
</div>
</body></html>
