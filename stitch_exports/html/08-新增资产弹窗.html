<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1890FF",
                        "on-primary": "#ffffff",
                        "primary-container": "#e6f7ff",
                        "on-primary-container": "#003a8c",
                        "surface": "#f7f9fc",
                        "on-surface": "#191c1e",
                        "surface-variant": "#e0e3e6",
                        "on-surface-variant": "#404753",
                        "outline": "#707785",
                        "outline-variant": "#c0c7d6",
                        "surface-container-low": "#f2f4f7",
                        "surface-container": "#eceef1",
                        "surface-container-high": "#e6e8eb",
                        "surface-container-highest": "#e0e3e6",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["PingFang SC", "Inter", "sans-serif"],
                        "body": ["PingFang SC", "Inter", "sans-serif"],
                        "label": ["PingFang SC", "Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "8px",
                        "lg": "12px",
                        "xl": "16px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
            line-height: 1;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tap-highlight-transparent { -webkit-tap-highlight-color: transparent; }
        body { min-height: max(884px, 100dvh); }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- Mock Background Content (Dashboard View) -->
<div class="min-h-screen pb-20 overflow-hidden">
<header class="flex justify-between items-center px-4 py-3 w-full bg-[#F7F9FC]/80 backdrop-blur-md z-50 sticky top-0 shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">menu</span>
<h1 class="font-headline text-sm font-semibold tracking-tight text-primary">资产管理</h1>
</div>
<span class="material-symbols-outlined text-primary">qr_code_scanner</span>
</header>
<main class="p-4 space-y-4">
<div class="bg-surface-container-lowest rounded-lg p-4 shadow-sm">
<div class="flex justify-between items-end mb-2">
<span class="text-on-surface-variant text-xs font-medium">总资产价值 (估算)</span>
<span class="text-primary font-bold text-lg">¥1,284,000.00</span>
</div>
<div class="w-full bg-surface-container-low h-1.5 rounded-full overflow-hidden">
<div class="bg-primary h-full w-2/3"></div>
</div>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="bg-surface-container-lowest p-4 rounded-lg flex flex-col gap-1">
<span class="text-on-surface-variant text-[10px] font-bold uppercase tracking-wider">在库资产</span>
<span class="text-2xl font-semibold text-on-surface">1,402</span>
</div>
<div class="bg-surface-container-lowest p-4 rounded-lg flex flex-col gap-1">
<span class="text-on-surface-variant text-[10px] font-bold uppercase tracking-wider">待维保</span>
<span class="text-2xl font-semibold text-[#faad14]">24</span>
</div>
</div>
<div class="space-y-3">
<h2 class="text-sm font-semibold text-on-surface px-1">最近录入</h2>
<div class="bg-surface-container-lowest rounded-lg overflow-hidden border-l-4 border-primary">
<div class="p-4 flex gap-4">
<div class="w-12 h-12 bg-surface-container-low rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-outline">image</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-start">
<h3 class="text-sm font-medium">ThinkPad X1 Carbon</h3>
<span class="text-[10px] bg-primary-container text-on-primary-container px-1.5 py-0.5 rounded">电子设备</span>
</div>
<p class="text-xs text-on-surface-variant mt-1">SN: RFID-2023-0091</p>
</div>
</div>
</div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-black/40 z-[60] backdrop-blur-[2px] transition-opacity flex items-end">
<!-- Bottom Sheet Panel -->
<div class="bg-white w-full rounded-t-xl shadow-2xl relative flex flex-col max-h-[92dvh] transition-transform translate-y-0">
<!-- Handle Decorator -->
<div class="flex justify-center py-2.5">
<div class="w-10 h-1 bg-outline-variant/30 rounded-full"></div>
</div>
<!-- Header -->
<div class="px-5 pb-3 border-b border-outline-variant/10 flex justify-between items-center">
<h2 class="text-base font-bold text-on-surface tracking-tight">新增资产</h2>
<button class="text-on-surface-variant p-1 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<!-- Content Area (Scrollable) -->
<div class="flex-1 overflow-y-auto no-scrollbar px-5 py-3 space-y-4">
<!-- Section: Primary Info & Photo -->
<div class="flex gap-3 items-start">
<!-- Photo Upload -->
<div class="w-20 h-20 bg-surface-container-low rounded-lg border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-on-surface-variant shrink-0 cursor-pointer">
<span class="material-symbols-outlined text-xl">add_a_photo</span>
<span class="text-[9px] font-medium mt-0.5">照片上传</span>
</div>
<!-- Name & Code -->
<div class="flex-1 space-y-2">
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">资产名称</label>
<input class="w-full bg-surface-container-low border-none rounded-lg text-xs px-3 py-2 focus:ring-1 focus:ring-primary/40 placeholder:text-outline-variant" placeholder="输入资产名称" type="text"/>
</div>
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">资产编码</label>
<input class="w-full bg-surface-container-low border-none rounded-lg text-xs px-3 py-2 focus:ring-1 focus:ring-primary/40 placeholder:text-outline-variant" placeholder="AUTOGEN-2024" type="text"/>
</div>
</div>
</div>
<!-- Section: RFID Identification (Updated with Dual Buttons) -->
<div class="bg-primary/5 rounded-lg p-3 border border-primary/10">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-primary text-base">sensors</span>
<span class="text-[10px] font-bold text-primary">RFID 标签</span>
</div>
<div class="flex gap-2">
<button class="flex items-center gap-1 bg-primary text-white text-[9px] font-bold px-2.5 py-1 rounded-full shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xs">wifi_tethering</span>
                                感应
                            </button>
<button class="flex items-center gap-1 bg-primary text-white text-[9px] font-bold px-2.5 py-1 rounded-full shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xs">qr_code_scanner</span>
                                扫码
                            </button>
</div>
</div>
<input class="w-full bg-white/60 border-none rounded-lg text-[10px] font-mono py-1.5 tracking-tight text-primary text-center" readonly="" type="text" value="E280 1160 2000 71E4 513A"/>
</div>
<!-- Section: Categorization -->
<div class="grid grid-cols-2 gap-3">
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">所属部门</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-low border-none rounded-lg text-xs px-3 py-2 focus:ring-1 focus:ring-primary/40 pr-8">
<option>技术研发部</option>
<option>财务部</option>
<option>行政部</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-base">expand_more</span>
</div>
</div>
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">资产类型</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-low border-none rounded-lg text-xs px-3 py-2 focus:ring-1 focus:ring-primary/40 pr-8">
<option>固定资产</option>
<option>易耗品</option>
<option>虚拟资产</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-base">expand_more</span>
</div>
</div>
</div>
<!-- Section: Date and Lifespan -->
<div class="grid grid-cols-1 gap-3">
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">领用日期</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg text-xs px-3 py-2 focus:ring-1 focus:ring-primary/40" type="date" value="2024-05-20"/>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">使用年限 (年)</label>
<input class="w-full bg-surface-container-low border-none rounded-lg text-xs px-3 py-2 focus:ring-1 focus:ring-primary/40" placeholder="0" type="number"/>
</div>
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">到期年限 (年)</label>
<input class="w-full bg-surface-container-low border-none rounded-lg text-xs px-3 py-2 focus:ring-1 focus:ring-primary/40" placeholder="0" type="number"/>
</div>
</div>
<!-- Section: Unit & Quantity -->
<div class="grid grid-cols-2 gap-3">
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">单位</label>
<input class="w-full bg-surface-container-low border-none rounded-lg text-xs px-3 py-2 focus:ring-1 focus:ring-primary/40" placeholder="台/个" type="text"/>
</div>
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">数量</label>
<div class="flex items-center bg-surface-container-low rounded-lg overflow-hidden h-[34px]">
<button class="px-2 text-primary active:bg-primary/10 h-full">
<span class="material-symbols-outlined text-base leading-none">remove</span>
</button>
<input class="flex-1 bg-transparent border-none text-center text-xs font-semibold focus:ring-0 px-0 h-full" type="number" value="1"/>
<button class="px-2 text-primary active:bg-primary/10 h-full">
<span class="material-symbols-outlined text-base leading-none">add</span>
</button>
</div>
</div>
</div>
<!-- Section: Custody & Location -->
<div class="grid grid-cols-2 gap-3">
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">保管人</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-2 top-1/2 -translate-y-1/2 text-on-surface-variant text-base">person</span>
<input class="w-full bg-surface-container-low border-none rounded-lg text-xs pl-8 pr-2 py-2 focus:ring-1 focus:ring-primary/40" placeholder="姓名/工号" type="text"/>
</div>
</div>
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">存放地点</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-2 top-1/2 -translate-y-1/2 text-on-surface-variant text-base">location_on</span>
<input class="w-full bg-surface-container-low border-none rounded-lg text-xs pl-8 pr-2 py-2 focus:ring-1 focus:ring-primary/40" placeholder="输入具体地点" type="text"/>
</div>
</div>
</div>
<!-- Section: Additional Info -->
<div class="space-y-0.5">
<label class="text-[10px] font-bold text-on-surface-variant px-1">其他信息</label>
<textarea class="w-full bg-surface-container-low border-none rounded-lg text-xs px-3 py-2 focus:ring-1 focus:ring-primary/40 resize-none placeholder:text-outline-variant" placeholder="备注信息..." rows="2"></textarea>
</div>
</div>
<!-- Action Bottom Bar -->
<div class="p-5 bg-white border-t border-outline-variant/10">
<button class="w-full bg-primary text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all text-sm tracking-widest">
                    确定录入
                </button>
<p class="text-[9px] text-center text-on-surface-variant/50 mt-3 italic">完成录入后将自动同步至 RFID 管理系统</p>
</div>
</div>
</div>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-[#C0C7D6]/15 rounded-t-lg shadow-[0_-4px_20px_0px_rgba(0,93,170,0.04)]">
<div class="flex flex-col items-center justify-center text-[#404753] dark:text-slate-500 opacity-70 hover:text-[#005DAA] dark:hover:text-blue-300 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined">home</span>
<span class="font-['PingFang_SC'] text-[0.6875rem] font-bold tracking-tight">首页</span>
</div>
<div class="flex flex-col items-center justify-center text-[#005DAA] dark:text-blue-400 scale-105 transition-transform active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
<span class="font-['PingFang_SC'] text-[0.6875rem] font-bold tracking-tight">资产</span>
</div>
<div class="flex flex-col items-center justify-center text-[#404753] dark:text-slate-500 opacity-70 hover:text-[#005DAA] dark:hover:text-blue-300 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined">qr_code_scanner</span>
<span class="font-['PingFang_SC'] text-[0.6875rem] font-bold tracking-tight">盘点</span>
</div>
<div class="flex flex-col items-center justify-center text-[#404753] dark:text-slate-500 opacity-70 hover:text-[#005DAA] dark:hover:text-blue-300 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined">settings</span>
<span class="font-['PingFang_SC'] text-[0.6875rem] font-bold tracking-tight">系统</span>
</div>
</nav>
</body></html>
