<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#a9c8f9",
              "inverse-on-surface": "#eff1f4",
              "secondary-container": "#afceff",
              "outline-variant": "#c0c7d6",
              "on-tertiary-container": "#fffbff",
              "on-primary-container": "#fefcff",
              "tertiary-container": "#b95a00",
              "on-background": "#191c1e",
              "on-secondary-fixed-variant": "#274871",
              "on-error-container": "#93000a",
              "inverse-surface": "#2d3133",
              "tertiary-fixed-dim": "#ffb688",
              "surface-variant": "#e0e3e6",
              "on-surface-variant": "#404753",
              "error-container": "#ffdad6",
              "surface": "#f7f9fc",
              "inverse-primary": "#a5c8ff",
              "surface-container-high": "#e6e8eb",
              "error": "#ba1a1a",
              "surface-container-low": "#f2f4f7",
              "outline": "#707785",
              "on-tertiary": "#ffffff",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#004785",
              "primary-fixed-dim": "#a5c8ff",
              "on-tertiary-fixed-variant": "#733600",
              "on-primary-fixed": "#001c3a",
              "surface-tint": "#005fae",
              "secondary-fixed": "#d4e3ff",
              "surface-container-highest": "#e0e3e6",
              "surface-container": "#eceef1",
              "on-secondary-fixed": "#001c3a",
              "primary-container": "#0075d5",
              "on-primary": "#ffffff",
              "on-error": "#ffffff",
              "tertiary": "#934600",
              "secondary": "#40608b",
              "on-surface": "#191c1e",
              "surface-dim": "#d8dadd",
              "primary-fixed": "#d4e3ff",
              "background": "#f7f9fc",
              "on-secondary-container": "#385782",
              "surface-bright": "#f7f9fc",
              "primary": "#1890FF",
              "on-tertiary-fixed": "#311300",
              "tertiary-fixed": "#ffdbc7"
            },
            fontFamily: {
              "headline": ["Inter", "PingFang SC", "sans-serif"],
              "body": ["Inter", "PingFang SC", "sans-serif"],
              "label": ["Inter", "PingFang SC", "sans-serif"]
            },
            borderRadius: {
                "DEFAULT": "0.5rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', 'PingFang SC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky flex justify-between items-center px-4 py-3 bg-[#F7F9FC]/80 backdrop-blur-md z-50 shadow-[0px_4px_20px_0px_rgba(24,144,255,0.06)]">
<div class="flex items-center gap-3">
<button class="text-on-surface-variant active:opacity-80 scale-95 transition-transform" style="">
<span class="material-symbols-outlined" style="">arrow_back</span>
</button>
<h1 class="text-[#1890FF] font-bold text-lg tracking-tight" style="">编辑资产</h1>
</div>
<div class="flex items-center gap-2">
<button class="text-on-surface-variant active:opacity-80 scale-95 transition-transform p-1" style="">
<span class="material-symbols-outlined text-error" style="">delete</span>
</button>
</div>
<div class="bg-primary h-0.5 absolute bottom-0 left-0 w-full opacity-10"></div>
</header>
<!-- Main Content (Scrollable Form) -->
<main class="flex-1 overflow-y-auto px-4 py-4 space-y-4 no-scrollbar">
<!-- Photo Section -->
<section class="bg-surface-container-lowest rounded-lg p-4 shadow-[0px_4px_20px_0px_rgba(24,144,255,0.06)]">
<div class="flex flex-col gap-3">
<label class="text-[0.6875rem] font-bold text-on-surface-variant tracking-wider uppercase" style="">资产照片</label>
<div class="grid grid-cols-3 gap-3">
<div class="aspect-square rounded-lg overflow-hidden bg-surface-container-low relative group">
<img alt="industrial equipment" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuANdXZDioR6Yo_adOsUthh1IXbTKuB1i58X1CnuJBQ08rlrrAyZ76Lc8CGRofbwUl8nOc5xwyqv6WU59wNgRcU9K_Lu2EhsZY9_Y0fYp8VkfMkCSn6lfs0RxbGAbHoEL_C217hVUYjEpcNNr18_36NYXyEish4M31txNfcvTqBSWI6-F1o63hhkQO9Y79naITrRLe4ex_pR-fIr2S99Hx9afdPvPJxXWzOeD2LX6AOotLPkbCSTyH4WzLGhKpoYcsmcegeH8qbHSju_" style=""/>
<div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white" style="">edit</span>
</div>
</div>
<button class="aspect-square rounded-lg border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center gap-1 text-on-surface-variant hover:bg-surface-container-low transition-colors" style="">
<span class="material-symbols-outlined text-primary" style="">add_a_photo</span>
<span class="text-[10px]" style="">添加图片</span>
</button>
</div>
</div>
</section>
<!-- RFID Status & High-Density Form -->
<section class="bg-surface-container-lowest rounded-lg shadow-[0px_4px_20px_0px_rgba(24,144,255,0.06)] overflow-hidden">
<!-- RFID Status Header -->
<div class="flex items-center justify-between p-4 border-b border-outline-variant/10"><div class="flex items-center gap-2">
<div class="w-1 h-5 bg-primary rounded-full"></div>
<span class="text-[14px] font-semibold" style="">RFID 状态</span>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center gap-1 px-3 py-1 bg-primary/10 rounded-full text-primary text-[12px] font-bold active:bg-primary/20" style=""><span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">sensors</span>
    感应</button>
<button class="flex items-center gap-1 px-3 py-1 bg-primary/10 rounded-full text-primary text-[12px] font-bold active:bg-primary/20" style=""><span class="material-symbols-outlined text-[14px]" style="">qr_code_scanner</span>
    扫码</button>
</div></div>
<!-- Form Fields -->
<div class="p-4 space-y-5">
<!-- Grid Form Layout -->
<div class="grid grid-cols-2 gap-x-4 gap-y-5">
<div class="col-span-2 space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">资产名称</label>
<input class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all" type="text" value="华为智能存储服务器 S5500"/>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">编码</label>
<input class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all font-['Inter']" type="text" value="AST-2023-0092"/>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">RFID 标签 ID</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all font-['Inter'] pr-8" type="text" value="E28068940000"/>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-primary text-sm" style="">copy_all</span>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">部门</label>
<select class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-primary/20 appearance-none">
<option>技术研发部</option>
<option>财务管理部</option>
<option>行政办公部</option>
</select>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">类型</label>
<select class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-primary/20 appearance-none">
<option>IT设备</option>
<option>办公家具</option>
<option>精密仪器</option>
</select>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">保管人</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all" type="text" value="张建国"/>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm" style="">person_search</span>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">存放地点</label>
<input class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-primary/20" type="text" value="A区-4号机房-R12"/>
</div>
</div>
</div>
</section>
<!-- Lifecycle & Status Information -->
<section class="gap-3">
<!-- Life Cycle Card -->
<div class="col-span-2 bg-surface-container-lowest p-4 rounded-lg shadow-[0px_4px_20px_0px_rgba(24,144,255,0.06)] space-y-4">
<div class="flex items-center gap-2">
<div class="w-1 h-4 bg-tertiary rounded-full"></div>
<span class="text-[14px] font-semibold" style="">生命周期</span>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">领用日期</label>
<input class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium font-['Inter']" type="date" value="2023-10-15"/>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">到期年限 (年)</label>
<input class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium font-['Inter']" type="number" value="5"/>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">已使用年限</label>
<div class="flex items-center gap-2 px-3 py-2 bg-surface-container-low rounded text-sm font-medium text-on-surface">
<span class="font-['Inter']" style="">1.2</span>
<span class="text-[10px] text-on-surface-variant" style="">年</span>
</div>
</div>
<div class="space-y-1.5 flex flex-col justify-end">
<div class="flex justify-between items-center text-[10px] font-bold mb-1">
<span class="text-on-surface-variant" style="">健康度</span>
<span class="text-tertiary" style="">85%</span>
</div>
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-tertiary w-[85%]"></div>
</div>
</div>
</div>
</div>
<!-- Signal Strength -->
<!-- Asset Health Summary -->
</section>
<!-- Others Section -->
<section class="bg-surface-container-lowest rounded-lg p-4 shadow-[0px_4px_20px_0px_rgba(24,144,255,0.06)] space-y-4">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">单位</label>
<input class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium" type="text" value="台"/>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">数量</label>
<input class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium font-['Inter']" type="number" value="1"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold text-on-surface-variant" style="">其他信息</label>
<textarea class="w-full bg-surface-container-low border-none rounded px-3 py-2 text-sm font-medium resize-none" rows="2">此设备于2023年Q3季度入库，保修期至2026年9月，包含3年上门服务协议。</textarea>
</div>
</section>
<div class="h-32"></div> <!-- Spacer for footer -->
</main>
<!-- Footer Buttons -->
<footer class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-xl px-4 py-4 flex flex-col gap-2 z-50 border-t border-outline-variant/10 shadow-[0_-4px_20px_rgba(0,0,0,0.04)]">
<button class="w-full py-3.5 bg-primary text-white rounded font-bold text-sm tracking-wide shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2" style=""><span class="material-symbols-outlined text-sm" style="">save</span>
        保存修改</button>
<button class="w-full py-2.5 border border-error/20 text-error rounded font-bold text-sm tracking-wide hover:bg-error-container/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" style=""><span class="material-symbols-outlined text-sm" style="">delete_forever</span>
        删除资产</button>
</footer>
</body></html>
