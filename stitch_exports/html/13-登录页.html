<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-primary": "#a5c8ff",
              "surface-bright": "#f9f9ff",
              "surface-tint": "#005fad",
              "on-secondary-fixed": "#001c3a",
              "secondary-container": "#b9d3fe",
              "surface-container-low": "#f1f3fc",
              "tertiary-fixed": "#ffdbc7",
              "on-background": "#181c22",
              "error": "#ba1a1a",
              "primary-container": "#0376d3",
              "tertiary": "#934600",
              "on-surface": "#181c22",
              "tertiary-container": "#b95a00",
              "surface-variant": "#e0e2ea",
              "inverse-on-surface": "#eef0f9",
              "outline-variant": "#c0c7d4",
              "on-error-container": "#93000a",
              "on-error": "#ffffff",
              "on-secondary": "#ffffff",
              "primary": "#005da9",
              "on-primary-container": "#fefcff",
              "error-container": "#ffdad6",
              "secondary": "#466084",
              "on-secondary-container": "#415b7f",
              "inverse-surface": "#2d3037",
              "on-tertiary": "#ffffff",
              "on-primary-fixed": "#001c3a",
              "surface-container": "#eceef6",
              "background": "#f9f9ff",
              "on-primary": "#ffffff",
              "secondary-fixed": "#d4e3ff",
              "on-tertiary-fixed": "#311300",
              "on-surface-variant": "#414752",
              "surface-container-highest": "#e0e2ea",
              "surface-container-high": "#e6e8f0",
              "surface": "#f9f9ff",
              "primary-fixed": "#d4e3ff",
              "outline": "#717784",
              "tertiary-fixed-dim": "#ffb688",
              "surface-dim": "#d8dae2",
              "primary-fixed-dim": "#a5c8ff",
              "on-tertiary-container": "#fffbff",
              "on-tertiary-fixed-variant": "#733500",
              "on-primary-fixed-variant": "#004784",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#aec8f2",
              "on-secondary-fixed-variant": "#2d486b"
            },
            fontFamily: {
              "headline": ["Inter", "Noto Sans SC"],
              "body": ["Inter", "Noto Sans SC"],
              "label": ["Inter", "Noto Sans SC"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', 'PingFang SC', 'Noto Sans SC', sans-serif;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(24px);
      }
    </style>
<style>
      body {
        min-height: 100dvh;
      }
    </style>
</head>
<body class="bg-surface min-h-screen flex flex-col items-center justify-center p-6 relative overflow-x-hidden">
<!-- Background Blur Decorative Elements -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<main class="w-full max-w-[400px] z-10 flex flex-col items-center justify-center py-8">
<!-- Content Wrapper for Perfect Centering -->
<div class="w-full flex flex-col items-center">
<!-- Brand Header -->
<header class="w-full mb-10 flex flex-col items-center text-center">
<div class="w-14 h-14 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center shadow-xl shadow-primary/20 mb-4">
<span class="material-symbols-outlined text-white text-3xl" data-icon="precision_manufacturing">precision_manufacturing</span>
</div>
<div>
<h1 class="text-2xl font-bold tracking-tight text-on-surface leading-tight">资产智管系统</h1>
<p class="text-[10px] uppercase tracking-[0.2em] text-on-surface-variant font-bold opacity-60 mt-1">智能资产管理</p>
</div>
</header>
<!-- Login Container -->
<div class="w-full surface-container-lowest rounded-2xl shadow-[0px_8px_32px_0px_rgba(0,93,170,0.08)] border border-outline-variant/20 overflow-hidden">
<div class="bg-surface-container-low/30 border-b border-outline-variant/10 py-5 text-center">
<h2 class="text-sm font-bold text-primary tracking-wide">账号密码登录</h2>
</div>
<div class="p-8 space-y-6">
<div class="space-y-4">
<!-- Username/Account Field -->
<div class="space-y-1.5">
<label class="text-[11px] font-bold text-on-surface-variant ml-1">用户名 / 账号</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/60 text-[20px]" data-icon="account_circle">account_circle</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-low border-transparent rounded-xl text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white transition-all outline-none" placeholder="请输入您的账号或手机号" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-[11px] font-bold text-on-surface-variant">登录密码</label>
<a class="text-[11px] font-medium text-primary hover:underline" href="#">忘记密码？</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/60 text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-container-low border-transparent rounded-xl text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white transition-all outline-none" placeholder="请输入登录密码" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center">
<button class="text-on-surface-variant/40 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-1">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary/20" id="remember-me" type="checkbox"/>
<label class="ml-2 text-[12px] text-on-surface-variant font-medium" for="remember-me">在此设备上记住密码</label>
</div>
<!-- Submit Button -->
<button class="w-full py-3.5 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-xl shadow-lg shadow-primary/25 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
<span>立即登录</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Offline Mode -->
<div class="flex justify-center pt-4">
<a class="flex items-center gap-1.5 text-[13px] font-medium text-on-surface-variant/70 hover:text-primary transition-colors duration-200" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="cloud_off">cloud_off</span>
<span>离线模式</span>
</a>
</div>
</div>
</div>
</div>
</main>
</body></html>
